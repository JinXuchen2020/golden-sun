name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wasm32
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build --target wasm32-unknown-unknown --release --lib
          cp target/wasm32-unknown-unknown/release/golden_sun.wasm .
          wasm-opt -O2 golden_sun.wasm -o golden_sun_bg.wasm
          cp index.html golden_sun.wasm golden_sun_bg.wasm dist/ 2>/dev/null || true

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
